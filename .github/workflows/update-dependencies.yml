---
name: update-dependencies

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Mondays at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-base-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx.
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Check for base image updates.
        id: check-updates
        run: |
          # Get current base image from Dockerfile
          CURRENT_IMAGE=$(grep "^FROM" Dockerfile | awk '{print $2}')
          echo "Current base image: $CURRENT_IMAGE"

          # Pull latest version
          docker pull "$CURRENT_IMAGE" --quiet

          # Get current and latest digests
          CURRENT_DIGEST=$(docker inspect --format='{{.RepoDigests}}' "$CURRENT_IMAGE" | grep -oP 'sha256:[a-f0-9]{64}' | head -1)
          echo "current_digest=$CURRENT_DIGEST" >> $GITHUB_OUTPUT

          # Check if we need to rebuild
          if [ -z "$CURRENT_DIGEST" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Build test image.
        if: steps.check-updates.outputs.updates_available == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Pull Request.
        if: steps.check-updates.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update base image dependencies'
          title: 'chore(deps): update base image dependencies'
          body: |
            ## Automated Base Image Update

            This PR updates the base Docker image to the latest version.

            ### Changes
            - Base image digest: `${{ steps.check-updates.outputs.current_digest }}`

            ### Testing
            - Build test completed successfully
            - Please review and test the updated image before merging

            ---
            *This PR was automatically generated by the update-dependencies workflow.*
          branch: chore/update-base-image
          delete-branch: true
          assignees: SimplicityGuy
          labels: dependencies,automated,docker

      - name: Send notification to Discord.
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
